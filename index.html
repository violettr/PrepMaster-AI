<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrepMaster AI - Admin Dashboard</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- KaTeX CSS & JS for Math Rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

  <link rel="stylesheet" href="./styles.css?v=4">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .toggle-container {
        display: flex; gap: 10px; margin-top: 20px; margin-bottom: 20px;
        background: rgba(0,0,0,0.3); border-radius: 12px; padding: 6px;
    }
    .toggle-btn {
        flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer;
        font-size: 0.95rem; font-weight: 600; color: #94a3b8; background: transparent;
        transition: all 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px;
    }
    .toggle-btn.active {
        background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.4);
    }
    .manual-input-row {
        display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
    }
    .manual-input-element {
        flex: 1; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08); 
        background: rgba(0,0,0,0.2); color: #fff; outline:none; font-family: inherit; font-size: 0.95rem;
    }
    .manual-input-element:focus { border-color: #60a5fa; }
    .radio-circle {
        width: 28px; height: 28px; border-radius: 50%; border: 2px solid #64748b; 
        cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .radio-circle.selected { border-color: #10b981; }
    .radio-circle.selected::after {
        content: ''; width: 14px; height: 14px; background: #10b981; border-radius: 50%;
    }
    .validation-box {
        background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3);
        padding: 15px; border-radius: 12px; margin-bottom: 20px; 
    }
    .validation-title { color: #10b981; font-weight: 600; font-size: 1rem; display: flex; align-items: center; gap: 8px; margin-bottom: 8px;}
    .validation-desc { color: #a7f3d0; font-size: 0.9rem; line-height: 1.4; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [problemText, setProblemText] = useState("");
  const [problemImage, setProblemImage] = useState(null);
  const [isOCRRunning, setIsOCRRunning] = useState(false);
  const [isAnalyzing, setIsAnalyzing] = useState(false);
  const [result, setResult] = useState(null);
  const [accuracyRate, setAccuracyRate] = useState('');

  const [options, setOptions] = useState([
    { id: 'A', type: 'text', content: '' },
    { id: 'B', type: 'text', content: '' },
    { id: 'C', type: 'text', content: '' },
    { id: 'D', type: 'text', content: '' },
    { id: 'E', type: 'text', content: '' }
  ]);
  const [correctAnswer, setCorrectAnswer] = useState('A');

  // KaTeX Auto Render Trigger
  useEffect(() => {
    if (result && window.renderMathInElement) {
       window.renderMathInElement(document.getElementById('math-container'), {
          delimiters: [
             {left: '$$', right: '$$', display: true},
             {left: '$', right: '$', display: false},
             {left: '\\(', right: '\\)', display: false},
             {left: '\\[', right: '\\]', display: true}
          ]
       });
    }
  }, [result]);

  const updateOptionType = (idx, type) => {
    const newOptions = [...options];
    newOptions[idx].type = type;
    newOptions[idx].content = '';
    setOptions(newOptions);
  };

  const updateOptionContent = (idx, content) => {
    const newOptions = [...options];
    newOptions[idx].content = content;
    setOptions(newOptions);
  };

  const fileToDataURL = (file) => {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result);
      reader.readAsDataURL(file);
    });
  };

  // 문제 텍스트 상자 붙여넣기 인식 (Gemini OCR 자동 시뮬레이션)
  const handleTextPaste = async (e) => {
    const items = e.clipboardData.items;
    for (let i = 0; i < items.length; i++) {
        if (items[i].type.indexOf("image") !== -1) {
            e.preventDefault();
            setIsOCRRunning(true);
            // 가짜 딜레이 후 텍스트 채우기 (나중에 실제 Gemini API 연동 부위)
            setTimeout(() => {
                setProblemText(prev => prev + (prev ? "\n\n" : "") + "함수 $f(x)$가 다음과 같이 주어질 때,\n$$ \\int_{0}^{\\infty} e^{-x^2} dx = \\frac{\\sqrt{\\pi}}{2} $$\n위 등식을 만족하는 해를 구하시오.");
                setIsOCRRunning(false);
            }, 1200);
            return;
        }
    }
  };

  // 도표/그림 상자 방으로 이미지 붙여넣기
  const handleImagePaste = async (e) => {
    const items = e.clipboardData.items;
    for (let i = 0; i < items.length; i++) {
        if (items[i].type.indexOf("image") !== -1) {
            e.preventDefault();
            const file = items[i].getAsFile();
            const url = await fileToDataURL(file);
            setProblemImage(url);
            return;
        }
    }
  };

  // 보기 전용 미니 상자 붙여넣기 기능
  const handleOptionImagePaste = async (e, idx) => {
    const items = e.clipboardData.items;
    for (let i = 0; i < items.length; i++) {
        if (items[i].type.indexOf("image") !== -1) {
            e.preventDefault();
            const file = items[i].getAsFile();
            const url = await fileToDataURL(file);
            updateOptionContent(idx, url);
            return;
        }
    }
  };

  const handleAnalyze = () => {
    if (!problemText.trim() && !problemImage) {
      alert("문제 텍스트나 그림 스샷을 최소 하나는 붙여넣어 주세요!");
      return;
    }
    setIsAnalyzing(true);
    setResult(null);

    // 대시보드 로직 맵핑 대기 시뮬레이션
    setTimeout(() => {
      setResult({
        translatedText: problemText || "(오직 이미지로만 출제된 문항입니다)",
        multiTags: [
          { name: "Quadratic function", percent: 50, color: "#f472b6" },
          { name: "Inverse function", percent: 30, color: "#a78bfa" },
          { name: "Arithmetic calculation", percent: 20, color: "#60a5fa" }
        ],
        accuracyRate: accuracyRate ? `${accuracyRate}%` : "데이터 누적 대기중",
        attachedImage: problemImage,
        finalOptions: options,
        answer: correctAnswer
      });
      setIsAnalyzing(false);
    }, 2000);
  };

  return (
    <>
      <div className="bg-glow-1"></div>
      <div className="bg-glow-2"></div>

      <header>
        <div className="logo">
          PrepMaster AI <span>Admin Dashboard</span>
        </div>
      </header>

      <main>
        {/* 왼쪽 섹션: 입력 상자들 */}
        <section className="card input-section">
          <h2>1. 수학 문제 스마트 업로드 (투 컷 스니핑)</h2>
          
          <div className="input-group">
            <label>📝 예시 문항 텍스트 (수식 스샷을 여기서 Ctrl+V 하면 1초 만에 자동 타이핑!)</label>
            <div className="textarea-wrapper">
               {isOCRRunning && (
                 <div className="ocr-overlay">
                    <span className="spinner"></span>
                    Gemini 비전이 이미지를 읽고 문자로 추출 중입니다...
                 </div>
               )}
               <textarea 
                 className="textarea-input" 
                 placeholder="텍스트를 직접 치거나, 컴퓨터 화면의 글자를 캡처해서 바로 컨트롤+V 해보세요!"
                 value={problemText}
                 onChange={(e) => setProblemText(e.target.value)}
                 onPaste={handleTextPaste}
               ></textarea>
            </div>
          </div>

          <div className="input-group mt-3">
            <label>📸 도형/그래프 원본 사진 첨부 (그림만 네모낳게 스샷 따서 Ctrl+V)</label>
            <div 
              className={`upload-area ${problemImage ? 'has-image' : ''}`}
              onPaste={handleImagePaste}
              tabIndex="0"
            >
              {problemImage ? (
                <div className="image-preview-container">
                   <img src={problemImage} alt="첨부됨" className="preview-image" />
                   <button className="remove-btn" onClick={(e) => { e.stopPropagation(); setProblemImage(null); }}>삭제</button>
                </div>
              ) : (
                <>
                  <p>이 상자를 클릭한 후 그림(스샷)을 붙여넣으세요 (Ctrl+V)</p>
                  <p style={{fontSize: '0.8rem', color: '#94a3b8', marginTop: '5px'}}>(자동 크롭 없이 가장 깔끔하고 오류 없는 원본 그림 저장 방식)</p>
                </>
              )}
            </div>
          </div>

          <div className="input-group mt-3">
            <label>📉 초기 예상 정답률 입력 (선택) - <span style={{color: '#94a3b8', fontSize: '0.8rem', fontWeight: 400}}>학생 누적 데이터에 따라 실시간 자동 업데이트됨</span></label>
            <div style={{display: 'flex', alignItems: 'center', gap: '8px', background: 'rgba(0,0,0,0.2)', padding: '10px 15px', borderRadius: '10px', border: '1px solid var(--border-glass)'}}>
               <input 
                 type="number" 
                 className="text-input"
                 style={{width: '90px'}}
                 placeholder="예) 65"
                 value={accuracyRate}
                 onChange={(e) => setAccuracyRate(e.target.value)}
                 min="0" max="100"
               />
               <span style={{color: '#94a3b8', fontSize: '0.9rem'}}>% (입력하지 않으면 학생 첫 응시 데이터로 자동 기록됩니다)</span>
            </div>
          </div>

          <div className="input-group mt-3">
            <label>🎯 선다형 보기(A~E) 입력란 - (자유형 토글)</label>
            <div className="options-manual-container">
              {options.map((opt, idx) => (
                <div key={idx} className={`manual-option-row ${correctAnswer === opt.id ? 'is-correct-row' : ''}`}>
                    <input 
                      type="radio" 
                      name="correct" 
                      checked={correctAnswer === opt.id} 
                      onChange={() => setCorrectAnswer(opt.id)} 
                      title="이 보기를 정답으로 지정"
                    />
                    <span className="option-letter">{opt.id}</span>
                    <select className="type-select" onChange={(e) => updateOptionType(idx, e.target.value)} value={opt.type}>
                       <option value="text">문자 치기</option>
                       <option value="image">스샷(Ctrl+V)</option>
                    </select>
                    
                    {opt.type === 'text' ? (
                        <input type="text" className="text-input flex-1" placeholder="보기 내용 입력..." value={opt.content} onChange={(e)=>updateOptionContent(idx, e.target.value)} />
                    ) : (
                        <div className="mini-upload-area flex-1" tabIndex="0" onPaste={(e)=>handleOptionImagePaste(e, idx)}>
                           {opt.content ? <img src={opt.content} className="mini-preview" /> : "여기를 클릭하고 스샷 Ctrl+V"}
                        </div>
                    )}
                </div>
              ))}
            </div>
          </div>

          <button className="btn-primary mt-4" onClick={handleAnalyze} disabled={isAnalyzing || isOCRRunning}>
             {isAnalyzing ? (
                <><span className="spinner"></span> AI 문항 검증 및 태깅 중...</>
             ) : "✨ 내용 확정 및 AI 안심 검증 실행"}
          </button>
        </section>

        {/* 오른쪽 섹션: 검증 결과물 */}
        <section className="card output-section">
          <h2>2. 미리보기 및 AI 데이터 맵핑 결과</h2>
          
          {isAnalyzing && (
             <div className="skeleton-container">
               <div className="skeleton"></div>
               <div className="skeleton" style={{width: '70%'}}></div>
               <div className="skeleton" style={{width: '85%'}}></div>
             </div>
          )}

          {!isAnalyzing && !result && (
            <div className="empty-state">
              좌측에서 스마트 복붙으로 문제를 올린 후 실행 버튼을 눌러주세요.
            </div>
          )}

          {!isAnalyzing && result && (
            <div className="result-container animation-fade-in">
              <div className="tags-row mb-3">
                <span className="tag-chip" style={{color: '#34d399', borderColor: 'rgba(52,211,153,0.3)', background: 'rgba(52,211,153,0.1)', padding: '6px 14px', fontSize: '0.85rem'}}>
                   실시간 통계 정답률: {result.accuracyRate}
                </span>
                <span className="tag-chip" style={{color: '#94a3b8', borderColor: 'rgba(255,255,255,0.1)', background: 'rgba(255,255,255,0.05)', fontWeight: 400}}>
                   (학생 OMR 마킹 시 자동 업데이트)
                </span>
              </div>

              <div className="multi-tag-table-container mb-3">
                 <h3 className="preview-box-title mb-2">📊 AI 다중 유형 분류 결과 (Multi-tagging)</h3>
                 <table className="tag-table">
                    <tbody>
                       {result.multiTags.map((tag, idx) => (
                          <tr key={idx}>
                             <td width="45%" className="tag-name">{tag.name}</td>
                             <td width="15%" className="tag-percent">{tag.percent}%</td>
                             <td width="40%">
                                <div className="progress-bg">
                                   <div className="progress-fill" style={{width: `${tag.percent}%`, backgroundColor: tag.color}}></div>
                                </div>
                             </td>
                          </tr>
                       ))}
                    </tbody>
                 </table>
              </div>

              <div className="preview-box">
                 <h3 className="preview-box-title">[AI가 번역 추출한 문제 텍스트]</h3>
                 <div className="preview-content" id="math-container" dangerouslySetInnerHTML={{__html: result.translatedText?.replace(/\n/g, '<br/>') || "(내용 없음)"}}></div>
                 
                 {result.attachedImage && (
                    <div className="mt-3">
                       <h3 className="preview-box-title">[별도 첨부된 도표/원본 그림]</h3>
                       <img src={result.attachedImage} className="result-image" />
                    </div>
                 )}
              </div>

              <div className="mt-4">
                 <h3 className="preview-box-title mb-2">[보기 출력 미리보기]</h3>
                 <div className="options-grid">
                    {result.finalOptions.map((opt, idx) => (
                      <div key={idx} className={`result-option ${opt.id === result.answer ? 'correct-highlight' : ''}`}>
                         <div className="option-letter-small">{opt.id}</div>
                         <div className="option-content-flex">
                           {opt.type === 'text' ? opt.content || '(입력 안 됨)' : (
                              opt.content ? <img src={opt.content} className="result-mini-image"/> : '(그림 없음)'
                           )}
                         </div>
                         {opt.id === result.answer && <span className="answer-badge">정답 OMR</span>}
                      </div>
                    ))}
                 </div>
              </div>

              <button className="btn-primary mt-auto">
                 ☁️ 이 완벽한 문항(Item)을 원장님 DB에 최종 저장
              </button>
            </div>
          )}
        </section>
      </main>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
