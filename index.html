<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrepMaster AI - Admin Dashboard</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css?v=3">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .toggle-container {
        display: flex; gap: 10px; margin-top: 20px; margin-bottom: 20px;
        background: rgba(0,0,0,0.3); border-radius: 12px; padding: 6px;
    }
    .toggle-btn {
        flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer;
        font-size: 0.95rem; font-weight: 600; color: #94a3b8; background: transparent;
        transition: all 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px;
    }
    .toggle-btn.active {
        background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.4);
    }
    .manual-input-row {
        display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
    }
    .manual-input-element {
        flex: 1; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08); 
        background: rgba(0,0,0,0.2); color: #fff; outline:none; font-family: inherit; font-size: 0.95rem;
    }
    .manual-input-element:focus { border-color: #60a5fa; }
    .radio-circle {
        width: 28px; height: 28px; border-radius: 50%; border: 2px solid #64748b; 
        cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .radio-circle.selected { border-color: #10b981; }
    .radio-circle.selected::after {
        content: ''; width: 14px; height: 14px; background: #10b981; border-radius: 50%;
    }
    .validation-box {
        background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3);
        padding: 15px; border-radius: 12px; margin-bottom: 20px; 
    }
    .validation-title { color: #10b981; font-weight: 600; font-size: 1rem; display: flex; align-items: center; gap: 8px; margin-bottom: 8px;}
    .validation-desc { color: #a7f3d0; font-size: 0.9rem; line-height: 1.4; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="./app.jsx?v=3"></script>
</body>
</html>
